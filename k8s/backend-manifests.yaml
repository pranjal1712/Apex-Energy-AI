apiVersion: apps/v1
kind: Deployment
metadata:
  name: apex-backend
  namespace: apex-energy
  labels:
    app: apex-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: apex-backend
  template:
    metadata:
      labels:
        app: apex-backend
    spec:
      containers:
      - name: backend
        image: pranjal1712/apex-energy-backend:latest
        ports:
        - containerPort: 8000
        env:
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: apex-secrets
              key: SECRET_KEY
        - name: GROQ_API_KEY
          valueFrom:
            secretKeyRef:
              name: apex-secrets
              key: GROQ_API_KEY
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: apex-secrets
              key: REDIS_URL
        - name: QDRANT_URL
          valueFrom:
            secretKeyRef:
              name: apex-secrets
              key: QDRANT_URL
        - name: QDRANT_API_KEY
          valueFrom:
            secretKeyRef:
              name: apex-secrets
              key: QDRANT_API_KEY
        - name: TAVILY_API_KEY
          valueFrom:
            secretKeyRef:
              name: apex-secrets
              key: TAVILY_API_KEY
        - name: GROQ_API_KEYS
          valueFrom:
            secretKeyRef:
              name: apex-secrets
              key: GROQ_API_KEYS
        - name: MAIL_USERNAME
          valueFrom:
            secretKeyRef:
              name: apex-secrets
              key: MAIL_USERNAME
        - name: MAIL_PASSWORD
          valueFrom:
            secretKeyRef:
              name: apex-secrets
              key: MAIL_PASSWORD
        - name: MAIL_FROM
          valueFrom:
            secretKeyRef:
              name: apex-secrets
              key: MAIL_FROM
        - name: ENVIRONMENT
          value: "production"
        - name: PORT
          value: "8000"
        - name: DEBUG
          value: "False"
        - name: ALLOWED_ORIGINS
          value: "http://13.126.34.158,http://localhost:5173"
        resources:
          limits:
            memory: "1Gi"
            cpu: "500m"
          requests:
            memory: "512Mi"
            cpu: "250m"
        livenessProbe:
          httpGet:
            path: /
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: apex-backend-svc
  namespace: apex-energy
spec:
  selector:
    app: apex-backend
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8000
  type: ClusterIP
