name: CD Pipeline - Hybrid Deployment (AWS + K8s)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: 'actions/checkout@v4'

      - name: Log in to Docker Hub
        uses: 'docker/login-action@v3'
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Backend
        uses: 'docker/build-push-action@v5'
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/apex-energy-backend:latest

      - name: Build and Push Frontend
        uses: 'docker/build-push-action@v5'
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/apex-energy-frontend:latest
          build-args: |
            VITE_GOOGLE_CLIENT_ID=${{ secrets.VITE_GOOGLE_CLIENT_ID }}
            VITE_API_URL=/api

  deploy-aws:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Deploy to EC2 via SSH
        uses: 'appleboy/ssh-action@master'
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/Apex-Energy-AI
            docker compose pull
            docker compose up -d
            docker image prune -f

  deploy-k8s:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout Code
        uses: 'actions/checkout@v4'

      - name: Set up Kubectl
        uses: 'azure/setup-kubectl@v3'
        with:
          version: 'latest'

      - name: Set Kubernetes Context
        uses: 'azure/k8s-set-context@v3'
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBECONFIG }}

      - name: Deploy to Kubernetes
        run: |
          kubectl apply -f k8s/namespace.yaml --insecure-skip-tls-verify
          kubectl apply -f k8s/backend-manifests.yaml --insecure-skip-tls-verify
          kubectl apply -f k8s/frontend-manifests.yaml --insecure-skip-tls-verify
          kubectl apply -f k8s/ingress.yaml --insecure-skip-tls-verify

      - name: Verify Deployment
        run: |
          kubectl rollout status deployment/apex-backend -n apex-energy --insecure-skip-tls-verify
          kubectl rollout status deployment/apex-frontend -n apex-energy --insecure-skip-tls-verify
